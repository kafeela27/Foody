<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">

<style>
.payment-container{
    max-width:700px;
    margin:40px auto;
    padding:20px;
}

.payment-card{
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.total-box{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

.payment-method{
    margin:15px 0;
}

.card-details{
    display:none;
    margin-top:15px;
}

.card-details input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

.submit-btn{
    width:100%;
    padding:12px;
    border:none;
    background:#ff5722;
    color:white;
    font-size:18px;
    cursor:pointer;
}
</style>

</head>

<body data-hide-auth-area="true" data-show-track-order="true">

<!-- Navbar -->
<div id="navbar"></div>

<div class="payment-container">

<div class="payment-card">

<h2>Payment Details</h2><br>

<div class="total-box">
Total Amount:
<span id="totalAmount"></span>
</div>



<!-- DELIVERY ADDRESS -->
<div style="margin-bottom:20px;">

<label style="font-weight:bold;">
Delivery Address
</label>

<textarea
    id="address"
    placeholder="Enter your delivery address"
    rows="4"
    style="width:100%;
           padding:10px;
           margin-top:8px;
           resize:none;">
</textarea>

</div>


<!-- PAYMENT METHOD -->
<div class="payment-method">
    <input type="radio" name="payment" value="cod" checked>
    Cash on Delivery
</div>

<div class="payment-method">
    <input type="radio" name="payment" value="card">
    Card Payment
</div>



<!-- CARD FORM -->

<div class="card-details" id="cardForm">

    <input
    type="text"
    id="cardName"
    placeholder="Card Holder Name">

<input
    type="text"
    id="cardNumber"
    placeholder="Card Number (10 digits)"
    maxlength="10"
    inputmode="numeric">

<input
    type="text"
    id="expiryDate"
    placeholder="MM/YY"
    maxlength="7"> 

<input
    type="text"
    id="cvv"
    placeholder="CVV (3 digits)"
    maxlength="3"
    inputmode="numeric">

</div>

<button class="submit-btn" id="submitPayment">
Submit Payment
</button>

</div>

</div>

<script type="module" src="payment.js"></script>
<script type="module" src="authentication.js"></script>

</body>
</html>
