<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - Foody</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body data-hide-auth-area="true" data-show-track-order="true">

    <div id="navbar"></div>

    <div class="cart-page">

        <h1 class="cart-title">
            <i class="ri-shopping-cart-2-fill"></i>
            My Cart
        </h1>

        <!-- Cart Items -->
        <div id="cart-container">
            <!-- Items will load from Firebase -->
        </div>

        <!-- Cart Summary -->
        <div class="summary">

            <div class="row">
                <span>Subtotal</span>
                <span id="subtotal">Rs. 0</span>
            </div>

            <div class="row">
                <span>Delivery Fee</span>
                <span>Rs. 200</span>
            </div>

            <hr>

            <div class="row total">
                <span>Total</span>
                <span id="total">Rs. 0</span>
            </div>

            <button class="checkout-btn" id="checkoutBtn">
                Proceed to Checkout
            </button>

        </div>

    </div>

    <!-- Load Navbar -->
    <script type="module">
        fetch("navbar.html")
            .then(response => response.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;
                window.dispatchEvent(new Event("navbarLoaded"));
            });
    </script>

    <script type="module" src="cartCount.js"></script>
    <script type="module" src="cart.js"></script>
    <script type="module" src="authentication.js"></script>

</body>

</html>
